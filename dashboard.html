<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    text-align: center;
}

h1 {
    background: #001f4d;
    color: white;
    padding: 15px;
}

.box {
    margin: 20px;
    padding: 20px;
    background: white;
    display: inline-block;
    width: 250px;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}
button {
    padding: 10px;
    background: #001f4d;
    color: white;
    border: none;
    border-radius: 5px;
}
</style>

<script>
function openPage(page){
    window.location.href = page;
}
</script>

</head>

<body>

<h1>Student Support Dashboard</h1>

<div class="box">
    <h3>Academic Issues</h3>
    <button onclick="openPage('academic.html')">View</button>
</div>

<div class="box">
    <h3>Mental Health</h3>
    <button onclick="openPage('mental.html')">View</button>
</div>

<div class="box">
    <h3>Financial Issues</h3>
    <button onclick="openPage('financial.html')">View</button>
</div>

<div class="box">
    <h3>Emergency Help</h3>
    <button onclick="openPage('emergency.html')">View</button>
</div>

</body>
</html>
